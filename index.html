<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Availability Tracker</title>
    <style>
      :root {
        --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f8fafc;
        --color-border-tertiary: #e5e7eb;
        --color-border-primary: #d1d5db;
        --color-text-primary: #111827;
        --color-text-secondary: #6b7280;
        --border-radius-lg: 22px;
        --border-radius-md: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
        color: #111827;
        font-family: var(--font-sans);
      }

      button {
        font: inherit;
      }

      .app-shell {
        max-width: 940px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      .panel {
        background: var(--color-background-primary);
        border: 1px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 1.5rem;
      }

      .panel + .panel {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="root" class="app-shell"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;

      const STORAGE_KEY = "team_availability_v1";
      const INITIAL_MEMBERS = [
        { id: "u1", name: "Arjun Mehta", avatar: "AM", role: "Frontend Engineer", color: "#4F6EF7" },
        { id: "u2", name: "Priya Sharma", avatar: "PS", role: "Product Manager", color: "#10B981" },
        { id: "u3", name: "David Chen", avatar: "DC", role: "Backend Engineer", color: "#F59E0B" },
        { id: "u4", name: "Leila Torres", avatar: "LT", role: "UX Designer", color: "#EC4899" },
        { id: "u5", name: "Marcus Reed", avatar: "MR", role: "DevOps Engineer", color: "#8B5CF6" },
        { id: "u6", name: "Sana Patel", avatar: "SP", role: "Data Analyst", color: "#06B6D4" },
        { id: "u7", name: "Tom Nguyen", avatar: "TN", role: "QA Engineer", color: "#F97316" },
        { id: "u8", name: "Fatima Al-Amin", avatar: "FA", role: "Scrum Master", color: "#14B8A6" },
      ];

      const defaultAvailability = () =>
        INITIAL_MEMBERS.reduce((state, member) => {
          state[member.id] = true;
          return state;
        }, {});

      const parseJson = (value) => {
        try {
          return JSON.parse(value);
        } catch {
          return null;
        }
      };

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      }

      async function loadAvailability() {
        try {
          const data = await fetchJson("/api/team");
          if (data?.availability) {
            return data.availability;
          }
        } catch (error) {
          console.warn("Backend unavailable; falling back to local storage.", error);
        }

        const stored = parseJson(window.localStorage.getItem(STORAGE_KEY));
        return stored || defaultAvailability();
      }

      async function persistAvailability(next) {
        try {
          await fetchJson("/api/availability", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ availability: next }),
          });
        } catch (error) {
          console.warn("Backend save failed; saving to localStorage.", error);
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        }
      }

      function Toggle({ checked, onChange, label }) {
        return (
          <button
            type="button"
            role="switch"
            aria-checked={checked}
            aria-label={label}
            onClick={onChange}
            onKeyDown={(event) => event.key === " " && (event.preventDefault(), onChange())}
            style={{
              position: "relative",
              width: 44,
              height: 24,
              borderRadius: 12,
              border: "none",
              cursor: "pointer",
              background: checked ? "#22c55e" : "#d1d5db",
              transition: "background 0.22s ease",
              flexShrink: 0,
              padding: 0,
              outline: "none",
            }}
          >
            <span
              style={{
                position: "absolute",
                top: 3,
                left: checked ? 23 : 3,
                width: 18,
                height: 18,
                borderRadius: "50%",
                background: "#fff",
                transition: "left 0.22s cubic-bezier(.4,0,.2,1)",
                boxShadow: "0 1px 3px rgba(0,0,0,0.18)",
              }}
            />
          </button>
        );
      }

      function StatusBadge({ available }) {
        return (
          <span
            style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 5,
              fontSize: 12,
              fontWeight: 500,
              padding: "3px 10px",
              borderRadius: 20,
              background: available ? "rgba(34,197,94,0.12)" : "rgba(156,163,175,0.15)",
              color: available ? "#16a34a" : "#6b7280",
              transition: "all 0.2s ease",
              minWidth: 88,
              justifyContent: "center",
            }}
          >
            <span
              style={{
                width: 6,
                height: 6,
                borderRadius: "50%",
                background: available ? "#22c55e" : "#9ca3af",
                flexShrink: 0,
              }}
            />
            {available ? "Available" : "Away"}
          </span>
        );
      }

      function MemberRow({ member, available, onToggle, saving }) {
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 14,
              padding: "14px 20px",
              background: "var(--color-background-primary)",
              borderRadius: "var(--border-radius-lg)",
              border: "0.5px solid var(--color-border-tertiary)",
              transition: "border-color 0.15s ease, opacity 0.15s ease",
              opacity: saving ? 0.7 : 1,
            }}
          >
            <div
              style={{
                width: 40,
                height: 40,
                borderRadius: "50%",
                background: member.color + "22",
                color: member.color,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontWeight: 600,
                fontSize: 13,
                flexShrink: 0,
                border: `1.5px solid ${member.color}44`,
              }}
            >
              {member.avatar}
            </div>

            <div style={{ flex: 1, minWidth: 0 }}>
              <p
                style={{
                  margin: 0,
                  fontWeight: 500,
                  fontSize: 14,
                  color: "var(--color-text-primary)",
                  whiteSpace: "nowrap",
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                }}
              >
                {member.name}
              </p>
              <p style={{ margin: 0, fontSize: 12, color: "var(--color-text-secondary)", marginTop: 1 }}>
                {member.role}
              </p>
            </div>

            <StatusBadge available={available} />
            <Toggle checked={available} onChange={() => onToggle(member.id)} label={`Toggle availability for ${member.name}`} />
          </div>
        );
      }

      function TeamAvailabilityTracker() {
        const [availability, setAvailability] = useState({});
        const [saving, setSaving] = useState({});
        const [loaded, setLoaded] = useState(false);
        const [filter, setFilter] = useState("all");
        const [lastUpdated, setLastUpdated] = useState(null);

        useEffect(() => {
          loadAvailability().then((data) => {
            setAvailability(data);
            setLoaded(true);
          });
        }, []);

        const toggleMember = useCallback((id) => {
          setSaving((prev) => ({ ...prev, [id]: true }));
          setAvailability((prev) => {
            const next = { ...prev, [id]: !prev[id] };
            persistAvailability(next)
              .catch(() => null)
              .finally(() => setSaving((state) => ({ ...state, [id]: false })));
            setLastUpdated(new Date().toLocaleTimeString());
            return next;
          });
        }, []);

        const setAllAvailability = async (value) => {
          const next = INITIAL_MEMBERS.reduce((state, member) => {
            state[member.id] = value;
            return state;
          }, {});

          setAvailability(next);
          await persistAvailability(next);
          setLastUpdated(new Date().toLocaleTimeString());
        };

        const availableCount = Object.values(availability).filter(Boolean).length;
        const totalCount = INITIAL_MEMBERS.length;

        const filtered = INITIAL_MEMBERS.filter((member) => {
          if (filter === "available") return availability[member.id];
          if (filter === "away") return !availability[member.id];
          return true;
        });

        if (!loaded) {
          return (
            <div style={{ padding: "2rem", textAlign: "center", color: "var(--color-text-secondary)", fontSize: 14 }}>
              Loading team data…
            </div>
          );
        }

        return (
          <div className="panel">
            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 600, color: "var(--color-text-primary)" }}>Team availability</h1>
            <p style={{ margin: "0.75rem 0 1.5rem", fontSize: 14, color: "var(--color-text-secondary)" }}>
              {availableCount} of {totalCount} members available
              {lastUpdated && <span> · updated {lastUpdated}</span>}
            </p>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 12, marginBottom: "1.5rem" }}>
              {[
                { label: "Available", value: availableCount, accent: "#22c55e" },
                { label: "Away", value: totalCount - availableCount, accent: "#9ca3af" },
                { label: "Total", value: totalCount, accent: "#4F6EF7" },
              ].map(({ label, value, accent }) => (
                <div key={label} style={{ background: "#f8fafc", borderRadius: "var(--border-radius-md)", padding: "1rem", textAlign: "center" }}>
                  <p style={{ margin: 0, fontSize: 12, color: "var(--color-text-secondary)" }}>{label}</p>
                  <p style={{ margin: "0.5rem 0 0", fontSize: 26, fontWeight: 700, color: accent }}>{value}</p>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "space-between", marginBottom: "1rem" }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["all", "available", "away"].map((option) => (
                  <button
                    key={option}
                    type="button"
                    onClick={() => setFilter(option)}
                    style={{
                      fontSize: 12,
                      padding: "6px 14px",
                      borderRadius: 20,
                      border: option === filter ? "1px solid #374151" : "1px solid var(--color-border-tertiary)",
                      background: option === filter ? "#eef2ff" : "transparent",
                      color: option === filter ? "#111827" : "#6b7280",
                      cursor: "pointer",
                      fontWeight: option === filter ? 600 : 500,
                    }}
                  >
                    {option.charAt(0).toUpperCase() + option.slice(1)}
                  </button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <button type="button" onClick={() => setAllAvailability(true)} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 20, border: "1px solid var(--color-border-tertiary)", background: "transparent", color: "#6b7280", cursor: "pointer" }}>
                  Mark all available
                </button>
                <button type="button" onClick={() => setAllAvailability(false)} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 20, border: "1px solid var(--color-border-tertiary)", background: "transparent", color: "#6b7280", cursor: "pointer" }}>
                  Mark all away
                </button>
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.length === 0 && (
                <p style={{ textAlign: "center", color: "var(--color-text-secondary)", fontSize: 13, padding: "2rem 0" }}>
                  No members match this filter.
                </p>
              )}
              {filtered.map((member) => (
                <MemberRow key={member.id} member={member} available={!!availability[member.id]} onToggle={toggleMember} saving={!!saving[member.id]} />
              ))}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<TeamAvailabilityTracker />);
    </script>
  </body>
</html>
